<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>模型解释 - 贷款客户信息修复与智能决策系统</title>
  <script src="/dashboard/assets/echarts.min.js"></script>
  <link rel="stylesheet" href="/dashboard/css/main.css" />
  <style>
    /* Model Explain Page */
    .model-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* SHAP waterfall explanation */
    .shap-waterfall {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 12px;
    }

    .shap-bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .shap-bar-label {
      width: 100px;
      text-align: right;
      color: var(--color-text-muted);
      font-size: 11px;
      flex-shrink: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .shap-bar-track {
      flex: 1;
      height: 16px;
      background: #f0f0f0;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }

    .shap-bar-fill {
      height: 100%;
      border-radius: 8px;
      transition: width 0.5s ease;
      position: absolute;
    }

    .shap-bar-fill.positive {
      left: 50%;
      background: linear-gradient(to right, rgba(234,67,53,0.2), #ea4335);
    }

    .shap-bar-fill.negative {
      right: 50%;
      background: linear-gradient(to left, rgba(52,168,83,0.2), #34a853);
    }

    .shap-bar-value {
      width: 50px;
      font-weight: 600;
      font-size: 11px;
      flex-shrink: 0;
    }

    /* Model comparison table */
    .model-comp-table .best-cell {
      background: #e6f4ea;
      font-weight: 700;
    }

    /* Decision case cards */
    .decision-case {
      background: var(--color-card);
      border-radius: var(--radius-md);
      padding: 16px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 12px;
      border-left: 4px solid;
    }

    .decision-case.approve { border-left-color: #34a853; }
    .decision-case.reject { border-left-color: #ea4335; }
    .decision-case.caution { border-left-color: #f9ab00; }

    .case-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .case-title {
      font-weight: 600;
      font-size: 14px;
    }

    .case-features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .case-feature {
      background: #f5f7fa;
      padding: 6px 10px;
      border-radius: 4px;
    }

    .case-feature .cf-label {
      color: var(--color-text-muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .case-feature .cf-value {
      font-weight: 600;
      font-size: 13px;
    }

    .case-reason {
      font-size: 12px;
      color: var(--color-text-muted);
      background: #fafbfc;
      padding: 8px 12px;
      border-radius: 4px;
      line-height: 1.5;
    }

    /* SHAP detail accordion */
    .shap-detail-item {
      border-bottom: 1px solid var(--color-border);
      padding: 12px 0;
    }

    .shap-detail-item:last-child {
      border-bottom: none;
    }

    .shap-detail-header {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .shap-detail-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .shap-detail-name {
      flex: 1;
      font-weight: 600;
      font-size: 13px;
    }

    .shap-detail-effect {
      font-weight: 700;
      font-size: 14px;
    }

    .shap-detail-effect.positive { color: var(--color-danger); }
    .shap-detail-effect.negative { color: var(--color-success); }

    .shap-detail-desc {
      margin-top: 8px;
      font-size: 12px;
      color: var(--color-text-muted);
      line-height: 1.6;
      padding-left: 42px;
    }

    /* Metric comparison bars */
    .metric-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .metric-bar-label {
      width: 70px;
      font-weight: 500;
      flex-shrink: 0;
    }

    .metric-bar-track {
      flex: 1;
      height: 20px;
      background: #f0f0f0;
      border-radius: 10px;
      overflow: hidden;
    }

    .metric-bar-fill {
      height: 100%;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 8px;
      font-weight: 700;
      font-size: 11px;
      color: white;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo">
        <div class="logo-icon">&#x1F3E6;</div>
        <span>贷款客户信息修复与智能决策系统</span>
      </div>
      <nav class="header-nav">
        <a href="/dashboard/index.html" class="nav-link">综合看板</a>
        <a href="/dashboard/customer_profile.html" class="nav-link">客户画像</a>
        <a href="/dashboard/risk_heatmap.html" class="nav-link">风险热力图</a>
        <a href="/dashboard/model_explain.html" class="nav-link active">模型解释</a>
        <a href="/dashboard/data_repair.html" class="nav-link">数据修复</a>
        <a href="/dashboard/data_import.html" class="nav-link">数据导入</a>
      </nav>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <div class="page-title" style="margin-bottom:16px;">
        <div class="title-left">
          <div class="title-icon">&#x1F4CA;</div>
          <div>
            <h1 style="font-size:1.4rem;margin:0;">模型解释与决策案例</h1>
            <div class="last-update">违约预测：XGBoost / BiLSTM / MLP &nbsp;·&nbsp; 欺诈检测：TabNet / 决策树 / 随机森林 &nbsp;·&nbsp; 特征解释：TreeSHAP</div>
          </div>
        </div>
      </div>

      <!-- Model Grid -->
      <div class="model-grid">
        <!-- Left Column -->
        <div style="display:flex;flex-direction:column;gap:16px;">
          <!-- SHAP Feature Importance Bar Chart -->
          <div class="card">
            <div class="card-header">
              <div class="card-title">
                <span class="card-title-icon" style="background:#fce8e6;color:#ea4335;">&#x1F50D;</span>
                SHAP 特征重要性 (Mean |SHAP value|)
              </div>
            </div>
            <div class="card-body">
              <div id="chartShapBar" class="chart-container" style="height:400px;"></div>
            </div>
          </div>

          <!-- Model Performance Comparison -->
          <div class="card">
            <div class="card-header">
              <div class="card-title">
                <span class="card-title-icon" style="background:#e8f0fe;color:#1a73e8;">&#x1F4CA;</span>
                多模型性能对比
              </div>
            </div>
            <div class="card-body">
              <div id="chartModelCompare" class="chart-container" style="height:280px;"></div>
              <table class="data-table model-comp-table mt-2">
                <thead>
                  <tr>
                    <th>模型</th>
                    <th>AUC</th>
                    <th>精确率</th>
                    <th>召回率</th>
                    <th>F1</th>
                    <th>速度</th>
                  </tr>
                </thead>
                <tbody id="modelCompareTable">
                  <!-- Filled by JS -->
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Right Column -->
        <div style="display:flex;flex-direction:column;gap:16px;">
          <!-- SHAP Waterfall (Single Prediction Explanation) -->
          <div class="card">
            <div class="card-header">
              <div class="card-title">
                <span class="card-title-icon" style="background:#fef7e0;color:#f9ab00;">&#x1F4A8;</span>
                单客户预测解释 (Waterfall Chart)
              </div>
            </div>
            <div class="card-body">
              <div class="explain-toolbar" style="display:flex;gap:6px;margin-bottom:10px;">
                <input id="explainCustomerInput" type="number" placeholder="输入客户ID 查看解释"
                       style="flex:1;padding:6px 10px;border:1px solid #d0d4d8;border-radius:4px;font-size:12px;">
                <button id="explainBtn" type="button"
                        style="padding:6px 14px;background:#1a73e8;color:#fff;border:0;border-radius:4px;font-size:12px;cursor:pointer;">解释</button>
                <button id="explainRandomBtn" type="button"
                        style="padding:6px 14px;background:#fff;color:#5f6368;border:1px solid #d0d4d8;border-radius:4px;font-size:12px;cursor:pointer;">随机</button>
              </div>
              <div id="chartShapWaterfall" class="chart-container" style="height:320px;"></div>
              <div class="shap-waterfall" id="shapWaterfallDetail">
                <div id="explainEmptyState" style="padding:30px 16px;text-align:center;color:#9aa0a6;font-size:12px;">
                  请输入客户 ID 并点击"解释"，或点击"随机"抽取一名真实客户查看其预测解释
                </div>
              </div>
            </div>
          </div>

          <!-- Feature Impact Details -->
          <div class="card">
            <div class="card-header">
              <div class="card-title">
                <span class="card-title-icon" style="background:#e6f4ea;color:#34a853;">&#x1F4A1;</span>
                特征影响分析 Top8
              </div>
            </div>
            <div class="card-body" id="shapDetailList">
              <!-- Filled by JS -->
            </div>
          </div>
        </div>
      </div>

      <!-- Decision Case Studies -->
      <div class="section-label mt-3">&#x2699; 决策案例参考</div>
      <div class="dashboard-grid" style="grid-template-columns:repeat(3,1fr);gap:16px;" id="decisionCases">
        <!-- Filled by JS -->
      </div>
    </main>
  </div>

  <script src="/dashboard/js/api.js"></script>
  <script src="/dashboard/js/model_explain.js"></script>
</body>
</html>
